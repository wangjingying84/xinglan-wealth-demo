var sels={};
function render(){
 var f=document.getElementById('form');var h='';var cur='';
 DATA.facts.forEach(function(x){
  if(x.g!==cur){h+='<div class="grp">'+x.g+'</div>';cur=x.g;}
  h+='<label class="chk" id="L'+x.id+'"><input type="checkbox" onchange="tog(\''+x.id+'\',this.checked)"><span>'+x.t+'</span></label>';
 });
 f.innerHTML=h;
}
function tog(id,v){sels[id]=v;document.getElementById('L'+id).classList.toggle('on',v);compute();}
function sel(all){DATA.facts.forEach(function(x){sels[x.id]=!!all;var l=document.getElementById('L'+x.id);l.classList.toggle('on',!!all);l.querySelector('input').checked=!!all;});compute();}
function uniq(a){var s=[],seen={};a.forEach(function(x){if(!seen[x]){seen[x]=1;s.push(x);}});return s;}
function compute(){
 var chosen=DATA.facts.filter(function(x){return sels[x.id];});
 var out=document.getElementById('out');
 document.getElementById('cnt').textContent=chosen.length?('已选 '+chosen.length+' 项'):'';

 chosen.forEach(function(x){tools=tools.concat(x.tools);rl=rl.concat(x.rl);cases=cases.concat(x.cases);laws=laws.concat(x.laws);caut=caut.concat(x.caut);});

 h+='<div class="sec2"><h4><span class="ic" style="background:#1565c0"></span>推荐工具组合（'+tools.length+'）</h4><div class="chips">'+tools.map(function(t){return '<span class="tool">'+t+'</span>';}).join('')+'</div></div>';
 if(rl.length){rl.sort(function(a,b){return parseInt(a.slice(1))-parseInt(b.slice(1));});
  h+='<div class="sec2"><h4><span class="ic" style="background:#c0392b"></span>触发行为红线（'+rl.length+'）</h4><div class="chips">'+rl.map(function(r){return '<span class="rl">'+(DATA.rlname[r]||r)+'</span>';}).join('')+'</div></div>';}
 h+='<div class="sec2"><h4><span class="ic" style="background:#5a2f8a"></span>可参照案例（'+cases.length+'）</h4><div class="chips">'+cases.map(function(c){return '<span class="case">'+DATA.cases[c]+'</span>';}).join('')+'</div></div>';
 h+='<div class="sec2"><h4><span class="ic" style="background:#1b5e20"></span>关键法源（'+laws.length+'）</h4><div class="chips">'+laws.map(function(l){return '<span class="law">'+l+'</span>';}).join('')+'</div></div>';
 h+='<div class="sec2"><h4><span class="ic" style="background:#c9a227"></span>不确定性 / 风控提示（'+caut.length+'）</h4>'+caut.map(function(c){return '<div class="caut">⚠ '+c+'</div>';}).join('')+'</div>';
 out.innerHTML=h;
}
