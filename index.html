<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>家族财富管理案例方案演练</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#0d1b2e 0%,#1a2f50 60%,#0d3b66 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;color:#e8edf5}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 20% 80%,rgba(100,160,255,.08) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(180,140,255,.06) 0%,transparent 50%);pointer-events:none}

.card{background:rgba(255,255,255,.06);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:48px 44px 40px;width:min(440px,92vw);box-shadow:0 24px 60px rgba(0,0,0,.45)}
.logo{text-align:center;margin-bottom:32px}
.logo-badge{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border:1px solid rgba(100,160,255,.3);margin-bottom:16px;font-size:28px}
.firm{font-size:12px;letter-spacing:.14em;color:#7fa8ce;font-weight:500}
.title{font-size:20px;font-weight:800;color:#e8edf5;margin-top:8px;line-height:1.45}

.label{font-size:12px;color:#7fa8ce;margin-bottom:8px;letter-spacing:.04em}
.pwd-wrap{position:relative;margin-bottom:20px}
.pwd-wrap input{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:10px;padding:13px 44px 13px 16px;font-size:16px;color:#e8edf5;outline:none;letter-spacing:.12em;transition:.2s}
.pwd-wrap input::placeholder{letter-spacing:0;color:#4a6a8a;font-size:13px}
.pwd-wrap input:focus{border-color:rgba(100,160,255,.5);background:rgba(255,255,255,.1)}
.eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:#5a7a9a;font-size:18px;user-select:none}
.eye:hover{color:#93afd4}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#1d4ed8,#1e3a8a);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:.08em;transition:.2s}
.btn:hover{background:linear-gradient(135deg,#2563eb,#1d4ed8);transform:translateY(-1px);box-shadow:0 6px 20px rgba(29,78,216,.4)}
.btn:active{transform:none}
.err{color:#f87171;font-size:12px;text-align:center;min-height:18px;margin-top:10px}

#content-box{display:none}
.section-label{font-size:11px;letter-spacing:.12em;color:#7fa8ce;text-transform:uppercase;margin-bottom:14px;font-weight:600}
.links{display:flex;flex-direction:column;gap:12px}
.link-card{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px 18px;cursor:pointer;text-decoration:none;color:inherit;transition:.2s}
.link-card:hover{background:rgba(255,255,255,.1);border-color:rgba(100,160,255,.3);transform:translateX(3px)}
.link-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.icon-blue{background:linear-gradient(135deg,#1d4ed8,#0ea5e9)}
.icon-indigo{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.link-text strong{display:block;font-size:14px;font-weight:700;color:#e8edf5;margin-bottom:3px}
.link-text span{font-size:12px;color:#7fa8ce}
.link-arrow{margin-left:auto;color:#5a7a9a;font-size:18px}
.divider{border:none;border-top:1px solid rgba(255,255,255,.08);margin:24px 0}
.logout{text-align:center;font-size:12px;color:#5a7a9a;cursor:pointer}
.logout:hover{color:#93afd4}

.copyright{margin-top:28px;text-align:center;font-size:11px;color:rgba(255,255,255,.28);line-height:1.9}
.copyright a{color:rgba(255,255,255,.38);text-decoration:none}
.copyright a:hover{color:rgba(255,255,255,.65)}

#watermark{display:none;position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.wm{position:absolute;font-size:13px;color:rgba(180,200,255,.055);transform:rotate(-25deg);white-space:nowrap;font-weight:600;letter-spacing:.04em}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-badge">⚖️</div>
    <div class="firm">FAMILY WEALTH · SIMULATION</div>
    <div class="title">家族财富管理<br>案例方案演练</div>
  </div>

  <div id="login-box">
    <div class="label">访问密码</div>
    <div class="pwd-wrap">
      <input type="password" id="pwd" placeholder="请输入访问密码" autocomplete="off" maxlength="32">
      <span class="eye" id="eye-btn">👁</span>
    </div>
    <button class="btn" id="login-btn">进 入</button>
    <div class="err" id="err-msg"></div>
  </div>

  <div id="content-box">
    <div class="section-label">方案文件</div>
    <div class="links">
      <a class="link-card" href="./case-overview.html" target="_blank">
        <div class="link-icon icon-blue">📋</div>
        <div class="link-text">
          <strong>十一案互动合览</strong>
          <span>十一个典型案例 · 架构对比 · 风险矩阵</span>
        </div>
        <div class="link-arrow">›</div>
      </a>
      <a class="link-card" href="./diagnostic.html" target="_blank">
        <div class="link-icon icon-indigo">🔍</div>
        <div class="link-text">
          <strong>客户诊断决策树工具</strong>
          <span>交互式风险评估 · 方案路径推荐</span>
        </div>
        <div class="link-arrow">›</div>
      </a>
    </div>
    <hr class="divider">
    <div class="logout" id="logout-btn">退出登录</div>
  </div>

  <div class="copyright">
    © 2026 yuan &nbsp;·&nbsp; 版权所有，侵权必究<br>
    本材料为原创作品，受《中华人民共和国著作权法》保护<br>
    未经许可不得复制、传播或用于商业用途<br>
    <a href="https://creativecommons.org/licenses/by-nc-nd/4.0/" target="_blank">CC BY-NC-ND 4.0</a>
  </div>
</div>

<div id="watermark"></div>

<script>
const HASH = '95af67d61da0e73b5affb6f38ffb5951fc897d8acacd85dd4b4ea5d765f65a0c';
const SK = 'xl_auth';

async function sha256(s) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

function showContent() {
  document.getElementById('login-box').style.display = 'none';
  document.getElementById('content-box').style.display = 'block';
  buildWatermark();
}
function showLogin() {
  document.getElementById('login-box').style.display = 'block';
  document.getElementById('content-box').style.display = 'none';
  document.getElementById('watermark').style.display = 'none';
  sessionStorage.removeItem(SK);
}
function buildWatermark() {
  const wm = document.getElementById('watermark');
  wm.style.display = 'block';
  wm.innerHTML = '';
  const t = '© 2026 yuan · 家族财富管理 · 模拟演练';
  for (let r = -2; r < 12; r++)
    for (let c = -1; c < 6; c++) {
      const d = document.createElement('div');
      d.className = 'wm';
      d.textContent = t;
      d.style.top = (r * 180 + 80) + 'px';
      d.style.left = (c * 360 - 60) + 'px';
      wm.appendChild(d);
    }
}

if (sessionStorage.getItem(SK) === '1') showContent();

document.getElementById('login-btn').addEventListener('click', async () => {
  const v = document.getElementById('pwd').value.trim();
  if (!v) { document.getElementById('err-msg').textContent = '请输入密码'; return; }
  if (await sha256(v) === HASH) {
    sessionStorage.setItem(SK, '1');
    document.getElementById('err-msg').textContent = '';
    showContent();
  } else {
    document.getElementById('err-msg').textContent = '密码错误，请重试';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
});

document.getElementById('pwd').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});
document.getElementById('eye-btn').addEventListener('click', () => {
  const i = document.getElementById('pwd');
  i.type = i.type === 'password' ? 'text' : 'password';
});
document.getElementById('logout-btn').addEventListener('click', showLogin);
</script>
</body>
</html>
